<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{{ config.business_name }} — Book an Appointment</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --teal-deep:    #0B4F4F;
    --teal-mid:     #1A7A6E;
    --teal-light:   #2ABFAB;
    --gold:         #C9A84C;
    --gold-light:   #E8C96A;
    --cream:        #FAF8F5;
    --cream-dark:   #F0EDE8;
    --white:        #FFFFFF;
    --text-dark:    #1C1C1C;
    --text-mid:     #4A4A4A;
    --text-light:   #888888;
    --shadow-soft:  0 4px 24px rgba(11,79,79,0.10);
    --shadow-card:  0 8px 40px rgba(11,79,79,0.15);
    --radius-lg:    18px;
    --radius-xl:    24px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    background-image:
      radial-gradient(ellipse at 10% 0%, rgba(42,191,171,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 90% 100%, rgba(201,168,76,0.06) 0%, transparent 60%);
  }

  /* ── HEADER ── */
  .header {
    width: 100%;
    background: var(--teal-deep);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 72px;
    box-shadow: 0 2px 20px rgba(11,79,79,0.3);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .header-logo {
    width: 42px;
    height: 42px;
    background: linear-gradient(135deg, var(--teal-light), var(--gold));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .header-text h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: 0.3px;
    line-height: 1.2;
  }

  .header-text p {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    font-weight: 400;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .header-status {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 6px 14px;
    border-radius: 100px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #4ADE80;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.6; transform: scale(0.85); }
  }

  .header-status span {
    font-size: 12px;
    color: rgba(255,255,255,0.8);
    font-weight: 500;
  }

  /* ── MAIN LAYOUT ── */
  .main {
    width: 100%;
    max-width: 800px;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 24px 16px 0;
    gap: 16px;
  }

  /* ── INFO STRIP ── */
  .info-strip {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .info-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--white);
    border: 1px solid rgba(11,79,79,0.10);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--text-mid);
    font-weight: 500;
    box-shadow: var(--shadow-soft);
  }

  .info-chip .icon { font-size: 14px; }

  /* ── CHAT CARD ── */
  .chat-card {
    background: var(--white);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-card);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border: 1px solid rgba(11,79,79,0.07);
    flex: 1;
  }

  /* ── ARIA BAR ── */
  .aria-bar {
    background: linear-gradient(135deg, var(--teal-deep) 0%, var(--teal-mid) 100%);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .aria-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .aria-avatar {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--teal-light), var(--gold));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    border: 2px solid rgba(255,255,255,0.2);
  }

  .aria-name {
    font-weight: 600;
    color: var(--white);
    font-size: 15px;
  }

  .aria-role {
    font-size: 11px;
    color: rgba(255,255,255,0.65);
    font-weight: 400;
  }

  .btn-reset {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.8);
    padding: 6px 14px;
    border-radius: 100px;
    font-size: 12px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.2s;
  }

  .btn-reset:hover {
    background: rgba(255,255,255,0.2);
    color: var(--white);
  }

  /* ── MESSAGES ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-height: 380px;
    max-height: 480px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--cream-dark); border-radius: 4px; }

  /* ── MESSAGE BUBBLES ── */
  .msg {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg.aria .msg-avatar {
    background: linear-gradient(135deg, var(--teal-light), var(--teal-mid));
  }

  .msg.user .msg-avatar {
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
  }

  .msg-bubble {
    max-width: 72%;
    padding: 12px 16px;
    border-radius: var(--radius-lg);
    font-size: 14px;
    line-height: 1.65;
    font-weight: 400;
  }

  .msg.aria .msg-bubble {
    background: var(--cream);
    color: var(--text-dark);
    border-bottom-left-radius: 4px;
    border: 1px solid rgba(11,79,79,0.07);
  }

  .msg.user .msg-bubble {
    background: linear-gradient(135deg, var(--teal-deep), var(--teal-mid));
    color: var(--white);
    border-bottom-right-radius: 4px;
  }

  /* ── TYPING DOTS ── */
  .typing-indicator {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .typing-bubble {
    background: var(--cream);
    border: 1px solid rgba(11,79,79,0.07);
    padding: 14px 18px;
    border-radius: var(--radius-lg);
    border-bottom-left-radius: 4px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .dot {
    width: 7px;
    height: 7px;
    background: var(--teal-light);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
    40%            { transform: translateY(-6px); opacity: 1; }
  }

  /* ── BOOKING CONFIRMATION CARD ── */
  .booking-card {
    background: linear-gradient(135deg, var(--teal-deep) 0%, #0d6b5e 100%);
    border-radius: 16px;
    padding: 20px;
    color: var(--white);
    margin-top: 4px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(11,79,79,0.35);
  }

  .booking-card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 140px; height: 140px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
  }

  .booking-card::after {
    content: '';
    position: absolute;
    bottom: -30px; left: -30px;
    width: 100px; height: 100px;
    background: rgba(201,168,76,0.08);
    border-radius: 50%;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px solid rgba(255,255,255,0.15);
  }

  .card-check {
    width: 32px; height: 32px;
    background: #4ADE80;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  .card-subtitle {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .card-rows {
    display: flex;
    flex-direction: column;
    gap: 9px;
    margin-bottom: 16px;
  }

  .card-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
  }

  .card-row .label {
    color: rgba(255,255,255,0.55);
    width: 72px;
    flex-shrink: 0;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .card-row .value {
    color: var(--white);
    font-weight: 500;
  }

  .card-gold {
    background: rgba(201,168,76,0.15);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--gold-light);
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }

  .btn-print {
    width: 100%;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--white);
    padding: 10px;
    border-radius: 10px;
    font-size: 13px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-print:hover {
    background: rgba(255,255,255,0.2);
  }

  /* ── INPUT AREA ── */
  .input-area {
    padding: 16px 20px 20px;
    border-top: 1px solid rgba(11,79,79,0.07);
    background: var(--white);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-box {
    flex: 1;
    background: var(--cream);
    border: 1.5px solid rgba(11,79,79,0.12);
    border-radius: 14px;
    padding: 12px 16px;
    font-size: 14px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    color: var(--text-dark);
    outline: none;
    resize: none;
    min-height: 48px;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  .input-box::placeholder { color: var(--text-light); }

  .input-box:focus {
    border-color: var(--teal-mid);
    background: var(--white);
  }

  .btn-send {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, var(--teal-deep), var(--teal-mid));
    border: none;
    border-radius: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    box-shadow: 0 4px 14px rgba(11,79,79,0.3);
  }

  .btn-send:hover   { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(11,79,79,0.4); }
  .btn-send:active  { transform: translateY(0); }
  .btn-send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-send svg { width: 20px; height: 20px; fill: white; }

  .input-hint {
    font-size: 11px;
    color: var(--text-light);
    text-align: center;
    margin-top: 10px;
  }

  /* ── FOOTER ── */
  .footer {
    padding: 20px 16px;
    text-align: center;
    font-size: 12px;
    color: var(--text-light);
  }

  .footer a { color: var(--teal-mid); text-decoration: none; }

  /* ── PRINT STYLES ── */
  @media print {
    body * { visibility: hidden; }
    .booking-card, .booking-card * { visibility: visible; }
    .booking-card {
      position: fixed; top: 40px; left: 50%;
      transform: translateX(-50%);
      width: 360px;
      box-shadow: none;
    }
    .btn-print { display: none; }
  }

  /* ── MOBILE ── */
  @media (max-width: 600px) {
    .info-strip { display: none; }
    .main { padding: 12px 10px 0; }
    .messages { max-height: 360px; padding: 16px 14px; }
    .msg-bubble { max-width: 85%; font-size: 13px; }
    .header-text h1 { font-size: 17px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-brand">
    <div class="header-logo">🦷</div>
    <div class="header-text">
      <h1>{{ config.business_name }}</h1>
      <p>{{ config.tagline }}</p>
    </div>
  </div>
  <div class="header-status">
    <div class="status-dot"></div>
    <span>Aria is online</span>
  </div>
</header>

<!-- MAIN -->
<main class="main">

  <!-- INFO CHIPS -->
  <div class="info-strip">
    <div class="info-chip"><span class="icon">📍</span>{{ config.clinic_address }}</div>
    <div class="info-chip"><span class="icon">📞</span>{{ config.contact_number }}</div>
    <div class="info-chip"><span class="icon">🕐</span>{{ config.clinic_hours }}</div>
  </div>

  <!-- CHAT CARD -->
  <div class="chat-card">

    <!-- ARIA BAR -->
    <div class="aria-bar">
      <div class="aria-info">
        <div class="aria-avatar">🦷</div>
        <div>
          <div class="aria-name">Aria</div>
          <div class="aria-role">AI Booking Assistant</div>
        </div>
      </div>
      <button class="btn-reset" onclick="resetChat()">New Conversation</button>
    </div>

    <!-- MESSAGES -->
    <div class="messages" id="messages">
      <!-- populated by JS -->
    </div>

    <!-- INPUT -->
    <div class="input-area">
      <div class="input-row">
        <textarea
          id="inputBox"
          class="input-box"
          placeholder="Type your message..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="btn-send" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">Press Enter to send &nbsp;·&nbsp; Shift+Enter for new line</p>
    </div>

  </div>
</main>

<footer class="footer">
  Powered by <a href="https://anthropic.com" target="_blank">Claude AI</a>
  &nbsp;·&nbsp; {{ config.business_name }}
</footer>

<script>
  const messagesEl = document.getElementById('messages');
  const inputBox   = document.getElementById('inputBox');
  const sendBtn    = document.getElementById('sendBtn');

  // ── Helpers ────────────────────────────────────────────────
  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // ── Render a chat bubble ───────────────────────────────────
  function addMessage(role, text) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'aria' ? '🦷' : '👤';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollToBottom();
  }

  // ── Render booking confirmation card ──────────────────────
  function addBookingCard(b) {
    const wrap = document.createElement('div');
    wrap.className = 'msg aria';

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = '🦷';

    const card = document.createElement('div');
    card.className = 'booking-card';
    card.innerHTML = `
      <div class="card-header">
        <div class="card-check">✓</div>
        <div>
          <div class="card-title">Booking Confirmed</div>
          <div class="card-subtitle">Appointment Summary</div>
        </div>
      </div>
      <div class="card-rows">
        <div class="card-row"><span class="label">Patient</span><span class="value">${b.patient_name}</span></div>
        <div class="card-row"><span class="label">Service</span><span class="value">${capitalize(b.service)}</span></div>
        <div class="card-row"><span class="label">Dentist</span><span class="value">${b.dentist}</span></div>
        <div class="card-row"><span class="label">Date</span><span class="value">${formatDate(b.date)}</span></div>
        <div class="card-row"><span class="label">Time</span><span class="value">${b.time}</span></div>
      </div>
      <div class="card-gold">
        📍 {{ config.clinic_address }}
      </div>
      <button class="btn-print" onclick="window.print()">🖨 Print / Save Confirmation</button>
    `;

    wrap.appendChild(avatar);
    wrap.appendChild(card);
    messagesEl.appendChild(wrap);
    scrollToBottom();
  }

  // ── Typing indicator ───────────────────────────────────────
  let typingEl = null;

  function showTyping() {
    typingEl = document.createElement('div');
    typingEl.className = 'msg aria typing-indicator';
    typingEl.id = 'typing';
    typingEl.innerHTML = `
      <div class="msg-avatar">🦷</div>
      <div class="typing-bubble">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    `;
    messagesEl.appendChild(typingEl);
    scrollToBottom();
  }

  function hideTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  // ── Format helpers ─────────────────────────────────────────
  function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }

  function formatDate(d) {
    try {
      return new Date(d + 'T00:00:00').toLocaleDateString('en-US', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
    } catch { return d; }
  }

  // ── Send message ───────────────────────────────────────────
  async function sendMessage() {
    const text = inputBox.value.trim();
    if (!text || sendBtn.disabled) return;

    addMessage('user', text);
    inputBox.value = '';
    inputBox.style.height = 'auto';
    sendBtn.disabled = true;
    showTyping();

    try {
      const res  = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      hideTyping();

      if (data.response) addMessage('aria', data.response);
      if (data.booking)  addBookingCard(data.booking);

    } catch (err) {
      hideTyping();
      addMessage('aria', 'Sorry, something went wrong. Please try again.');
    }

    sendBtn.disabled = false;
    inputBox.focus();
  }

  // ── Reset conversation ─────────────────────────────────────
  async function resetChat() {
    await fetch('/reset', { method: 'POST' });
    messagesEl.innerHTML = '';
    greet();
  }

  // ── Initial greeting ───────────────────────────────────────
  async function greet() {
    showTyping();
    try {
      const res  = await fetch('/greet', { method: 'POST' });
      const data = await res.json();
      hideTyping();
      if (data.response) addMessage('aria', data.response);
    } catch {
      hideTyping();
      addMessage('aria', 'Hello! Welcome to {{ config.business_name }}. How can I help you today?');
    }
  }

  // ── Init ───────────────────────────────────────────────────
  window.onload = () => {
    greet();
    inputBox.focus();
  };
</script>
</body>
</html>
